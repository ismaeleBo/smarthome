services:
  postgres:
    image: postgres:16
    container_name: smarthome-postgres
    platform: linux/amd64
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - smarthome_pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

  auth-service:
    build: ./auth-service
    container_name: auth-service
    platform: linux/amd64
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${AUTH_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SECURITY_JWT_ISSUER: ${JWT_ISSUER}
      SECURITY_JWT_SECRET: ${JWT_SECRET}
      SECURITY_JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES}
      APP_BOOTSTRAP_ADMIN_EMAIL: ${ADMIN_EMAIL}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  measurements-service:
    build: ./measurements-service
    container_name: measurements-service
    platform: linux/amd64
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${MEASUREMENTS_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SECURITY_JWT_ISSUER: ${JWT_ISSUER}
      SECURITY_JWT_SECRET: ${JWT_SECRET}
      CLIENTS_HOME_SERVICE_BASE_URL: http://home-service:8082/home
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    ports:
      - "8081:8081"

  home-service:
    build: ./home-service
    container_name: home-service
    platform: linux/amd64
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${HOME_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SECURITY_JWT_ISSUER: ${JWT_ISSUER}
      SECURITY_JWT_SECRET: ${JWT_SECRET}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      measurements-service:
        condition: service_started
      auth-service:
        condition: service_started
    ports:
      - "8082:8082"

  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      - rabbitmq
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8084:8084"

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    platform: linux/amd64
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      auth-service:
        condition: service_started
      home-service:
        condition: service_started
      measurements-service:
        condition: service_started
    ports:
      - "8085:8085"

volumes:
  smarthome_pgdata:
