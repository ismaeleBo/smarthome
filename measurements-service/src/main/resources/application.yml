server:
  port: 8081
  servlet:
    context-path: /measurements
spring:
  application:
    name: measurements-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
security:
  jwt:
    issuer: ${SECURITY_JWT_ISSUER}
    secret: ${SECURITY_JWT_SECRET}
    expires-minutes: ${SECURITY_JWT_EXPIRES_MINUTES:60}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      homeService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
  retry:
    instances:
      homeService:
        maxAttempts: 3
        waitDuration: 300ms
clients:
  home-service:
    base-url: ${CLIENTS_HOME_SERVICE_BASE_URL}
