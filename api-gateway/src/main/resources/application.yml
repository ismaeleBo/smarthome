server:
  port: 8085

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - Accept
            allowCredentials: true
      server:
        webflux:
          routes:
            - id: auth
              uri: http://auth-service:8080
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1

            - id: home
              uri: http://home-service:8082
              predicates:
                - Path=/api/home/**
              filters:
                - StripPrefix=1

            - id: measurements
              uri: http://measurements-service:8081
              predicates:
                - Path=/api/measurements/**
              filters:
                - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
